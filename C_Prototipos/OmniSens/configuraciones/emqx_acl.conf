%% EMQX Access Control List (ACL) configuration
%% Formato Erlang estándar para Reglas de Acceso a Tópicos MQTT

%% ----------------------------------------------------------------------------
%% 1. Backend (Servicio Core)
%% ----------------------------------------------------------------------------
%% Permite al backend publicar y suscribirse a cualquier tópico de la rama aqi/#
%% El usuario debe autenticarse como 'backend_service' (configurable en la BD de EMQX)
{allow, {user, "backend_service"}, all, ["aqi/#"]}.

%% ----------------------------------------------------------------------------
%% 2. Dispositivos Edge (ESP32 u otros microcontroladores)
%% ----------------------------------------------------------------------------
%% Nota: Para evitar problemas de compatibilidad con variables en EMQX 5, 
%% usamos comodines MQTT estándar (+).

%% a. Aprovisionamiento - Solicitud (Request)
%% Cualquier dispositivo autenticado puede PUBLICAR su solicitud de aprovisionamiento
{allow, all, publish, ["aqi/provisioning/request"]}.

%% b. Aprovisionamiento - Respuesta (Response)
%% El dispositivo puede SUSCRIBIRSE al tópico de respuesta
{allow, all, subscribe, ["aqi/provisioning/response/+"]}.

%% c. Telemetría - Publicación de Datos
%% El dispositivo puede PUBLICAR datos en el tópico correspondiente
{allow, all, publish, ["aqi/telemetry/+/#"]}.

%% d. Comandos (Actuadores, OTA, Config)
%% El dispositivo puede SUSCRIBIRSE a los comandos dirigidos
{allow, all, subscribe, ["aqi/commands/+/#"]}.

%% ----------------------------------------------------------------------------
%% 3. Regla por Defecto (Denegar todo lo demás)
%% ----------------------------------------------------------------------------
%% Si ninguna de las reglas anteriores hace "match", se deniega la acción.
{deny, all, all, ["#"]}.
