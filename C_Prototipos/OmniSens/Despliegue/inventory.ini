# Inventario de Ansible para Despliegue de Nube Híbrida - OmniSens
# Ubicación original: Despliegue/inventory.ini

[nodos_atom]
# Nodo local (Netbook Atom)
# NOTA: Reemplazar con la IP local de tu Netbook en la red de la casa/oficina.
netbook_local ansible_host=192.168.1.150 ansible_user=fernandogc

[nodos_aws]
# Nodo en la nube (AWS EC2)
# NOTA: Reemplazar con la IP pública de tu instancia EC2.
# Si usas Ubuntu, el usuario es "ubuntu". Si usas Amazon Linux/RHEL, cambia a "ec2-user".
# Configura la ruta absoluta a tu archivo de clave privada (.pem) en la Raspberry Pi.
aws_ec2 ansible_host=54.210.12.34 ansible_user=ubuntu ansible_ssh_private_key_file=/home/pi/.ssh/omnisens-aws.pem

[all:vars]
# Directorio donde se almacenará el código del proyecto en el destino
project_dir="/home/{{ ansible_user }}/aqi_project"

# Repositorio público de GitHub (se usa HTTPS para no requerir llaves SSH de clonado)
git_repo="https://github.com/fernandogc/Estrategia-y-Gesti-n-de-Proyectos-para-Soluciones-IoT-.git"
git_branch="main"
